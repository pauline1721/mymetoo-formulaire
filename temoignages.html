<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Témoignages anonymes - MyMeToo</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4effa;
  margin:0;
  padding:20px;
  color:#24106b;
}

.container{
  max-width:800px;
  margin:auto;
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
}

/* FEUILLES */
.leaf{
  position:absolute;
  width:480px;
  top:30px;
  opacity:.6;
  z-index:1;
}

.leaf.left{
  left:0;
}

.leaf.right{
  right:0; /* tu peux ajuster ici */
}

/* HEADER */
.header{
  text-align:center;
  position:relative;
  z-index:2;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

h1{
  margin:10px 0 0;
  color:#3b2c80;
}

.subtitle{
  font-size:20px;
  margin-top:5px;
}

/* TEXTE INTRO */
.info{
  margin:20px 0;
  padding:15px;
  background:#f7effb;
  border-radius:12px;
  text-align:center;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  overflow:hidden;
}

.meta{
  font-weight:bold;
  margin-bottom:10px;
}

/* MESSAGE */
.message{
  background:#f7effb;
  padding:15px;
  border-radius:10px;
  font-size:18px;
  line-height:1.5;

  /* 🔥 FIX MOBILE */
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
}

.date{
  text-align:right;
  font-size:12px;
  margin-top:10px;
  color:#777;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:20px;
  font-weight:bold;
  color:#6a4fb3;
}
</style>
</head>

<body>

<div class="container">

  <!-- FEUILLES -->
  <img src="feuille-gauche.png" class="leaf left">
  <img src="feuille-droite.png" class="leaf right">

  <!-- HEADER -->
  <div class="header">
    <img src="logoUNIS.png" class="logo">
    <h1>MyMeToo*</h1>
    <div class="subtitle">Les voix silencieuses</div>
  </div>

  <!-- TEXTE -->
  <div class="info">
    Ici, seules les paroles partagées volontairement apparaissent.<br>
    Chaque témoignage reste anonyme. Chaque voix compte.
  </div>

  <!-- DONNÉES -->
  <div id="data"></div>

  <div class="footer">
    ♡ Merci d’être là. Tu n’es pas seul(e). ♡
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadData(){
  const container = document.getElementById("data");
  container.innerHTML = "";

  const q = query(collection(db, "reponses"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach(doc => {
    const d = doc.data();

    // 🔥 On filtre uniquement les témoignages autorisés
    if(!d.partageAutorise || !d.message) return;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="meta">${d.age || ""} • ${d.genre || ""}</div>
      <div class="message">“ ${d.message} ”</div>
      <div class="date">${d.createdAt?.toDate().toLocaleDateString() || ""}</div>
    `;

    container.appendChild(div);
  });
}

loadData();

</script>

</body>
</html>
