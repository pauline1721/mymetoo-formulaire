<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Témoignages - MyMeToo</title>

<style>
:root{
  --violet:#24106b;
  --violet2:#6f42bd;
  --fond:#e8d7f3;
  --soft:#f7effb;
  --border:#d8c2eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--fond);
  font-family:Arial, sans-serif;
  color:var(--violet);
}

.page{
  width:100%;
  max-width:1030px;
  min-height:100vh;
  margin:0 auto;
  background:white;
  border:7px solid var(--border);
  border-radius:0 0 18px 18px;
  padding:18px 40px 30px;
  position:relative;
  overflow:hidden;
}

.leaf{
  position:absolute;
  width:480px;
  top:30px;
  opacity:.6;
  z-index:1;
}

.leaf.left{left:0}
.leaf.right{right:0}

.header{
  text-align:center;
  position:relative;
  z-index:2;
}

.logo{
  width:170px;
  display:block;
  margin:0 auto;
}

.unis{
  font-family:Georgia, serif;
  font-weight:bold;
  font-size:24px;
}

h1{
  font-family:Georgia, serif;
  font-size:60px;
  line-height:.9;
  margin:5px 0 8px;
}

.subtitle{
  font-family:Georgia, serif;
  font-size:30px;
  font-weight:bold;
  margin-bottom:18px;
}

.intro{
  position:relative;
  z-index:2;
  max-width:850px;
  margin:0 auto 25px;
  background:var(--soft);
  border:2px solid #ded2ec;
  border-radius:12px;
  text-align:center;
  padding:16px;
  font-size:20px;
  line-height:1.5;
}

.container{
  max-width:850px;
  margin:0 auto;
  position:relative;
  z-index:2;
}

.card{
  background:white;
  border:2px solid #eeeaf3;
  border-radius:14px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.04);
  overflow:hidden;
}

.meta{
  color:#6f42bd;
  font-weight:bold;
  font-size:14px;
  margin-bottom:10px;
}

.message{
  background:#f7effb;
  border-radius:12px;
  padding:18px;
  font-family:Georgia, serif;
  font-size:22px;
  line-height:1.45;
  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.message::before{
  content:"“";
  font-size:34px;
  color:#6f42bd;
}

.message::after{
  content:" ”";
  font-size:34px;
  color:#6f42bd;
}

.date{
  margin-top:10px;
  color:#8b78a8;
  font-size:13px;
  text-align:right;
}

.reply-btn{
  margin-top:14px;
  background:#6f42bd;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.reply-box{
  display:none;
  margin-top:15px;
  background:#f7effb;
  border-radius:12px;
  padding:14px;
}

.reply-box textarea{
  width:100%;
  min-height:80px;
  border:2px solid #d8c2eb;
  border-radius:10px;
  padding:10px;
  resize:vertical;
  font-size:16px;
  font-family:Arial, sans-serif;
}

.reply-send{
  margin-top:10px;
  background:linear-gradient(90deg,#5b23ad,#7e45d1);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.reply-status{
  margin-top:8px;
  font-weight:bold;
  color:#5b23ad;
}

.replies{
  margin-top:18px;
  padding-top:14px;
  border-top:1px solid #e5d9f2;
}

.replies-title{
  font-weight:bold;
  color:#6f42bd;
  margin-bottom:10px;
}

.reply{
  background:#fbf8ff;
  border-left:4px solid #6f42bd;
  border-radius:8px;
  padding:12px;
  margin-top:10px;
  font-size:16px;
  line-height:1.45;
  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.reply small{
  display:block;
  color:#8b78a8;
  margin-top:8px;
  font-size:12px;
}

.empty{
  text-align:center;
  background:var(--soft);
  border-radius:12px;
  padding:25px;
  font-weight:bold;
  color:#6f42bd;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#6e4cb0;
  font-weight:bold;
}

@media(max-width:800px){
  .page{padding:12px}
  .logo{width:130px}
  h1{font-size:46px}
  .subtitle{font-size:24px}
  .message{font-size:19px}
  .leaf{width:180px; opacity:.3}
}
</style>
</head>

<body>

<main class="page">

<img src="feuille-gauche.png" class="leaf left" alt="">
<img src="feuille-droite.png" class="leaf right" alt="">

<div class="header">
  <img src="logoUNIS.png" class="logo" alt="UNIS">
  <div class="unis">UNIS</div>
  <h1>MyMeToo*</h1>
  <div class="subtitle">Les voix silencieuses</div>
</div>

<div class="intro">
  Ici, seules les paroles partagées volontairement apparaissent.<br>
  Chaque témoignage reste anonyme. Chaque voix compte.
</div>

<div class="container" id="list"></div>

<div id="empty" class="empty" style="display:none;">
  Aucun témoignage pour le moment 💜
</div>

<div class="footer">
  ♡ Merci d’être là. Tu n’es pas seul(e). ♡
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.toggleReply = function(id){
  const box = document.getElementById("reply-" + id);
  box.style.display = box.style.display === "block" ? "none" : "block";
};

window.sendReply = async function(id){
  const text = document.getElementById("text-" + id).value.trim();
  const status = document.getElementById("status-" + id);

  if(!text){
    status.textContent = "Merci d’écrire une réponse avant d’envoyer.";
    return;
  }

  status.textContent = "Envoi en cours...";

  try{
    await addDoc(collection(db, "reponses", id, "commentaires"), {
      message: text,
      visible: true,
      createdAt: serverTimestamp()
    });

    document.getElementById("text-" + id).value = "";
    status.textContent = "Merci 💜 ta réponse anonyme a été envoyée.";

    setTimeout(() => {
      location.reload();
    }, 800);

  }catch(e){
    console.error(e);
    status.textContent = "Erreur : la réponse n’a pas pu être envoyée.";
  }
};

async function loadReplies(parentId){
  const repliesContainer = document.getElementById("replies-" + parentId);
  repliesContainer.innerHTML = "";

  const q = query(
    collection(db, "reponses", parentId, "commentaires"),
    orderBy("createdAt", "asc")
  );

  const snap = await getDocs(q);

  let replyCount = 0;

  snap.forEach(replyDoc => {
    const r = replyDoc.data();

    if(!r.message || r.visible === false) return;

    replyCount++;

    const date = r.createdAt?.toDate().toLocaleDateString("fr-FR") || "";

    const div = document.createElement("div");
    div.className = "reply";
    div.innerHTML = `
      ${r.message}
      <small>Réponse anonyme${date ? " • " + date : ""}</small>
    `;

    repliesContainer.appendChild(div);
  });

  if(replyCount > 0){
    const title = document.createElement("div");
    title.className = "replies-title";
    title.textContent = replyCount === 1 ? "1 réponse anonyme" : replyCount + " réponses anonymes";
    repliesContainer.prepend(title);
  }
}

async function load(){
  const container = document.getElementById("list");
  const empty = document.getElementById("empty");

  const q = query(collection(db,"reponses"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);

  let count = 0;

  for(const docSnap of snap.docs){
    const d = docSnap.data();
    const id = docSnap.id;

    if(!d.partageAutorise || !d.message || d.visible === false) continue;

    count++;

    const date = d.createdAt?.toDate().toLocaleDateString("fr-FR") || "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="meta">${d.age || ""} • ${d.genre || ""}</div>
      <div class="message">${d.message}</div>
      <div class="date">${date}</div>

      <button class="reply-btn" onclick="toggleReply('${id}')">
        Répondre anonymement
      </button>

      <div class="reply-box" id="reply-${id}">
        <textarea id="text-${id}" placeholder="Écris ta réponse anonyme ici..."></textarea>
        <button class="reply-send" onclick="sendReply('${id}')">Envoyer</button>
        <div class="reply-status" id="status-${id}"></div>
      </div>

      <div class="replies" id="replies-${id}"></div>
    `;

    container.appendChild(div);

    await loadReplies(id);
  }

  if(count === 0){
    empty.style.display = "block";
  }
}

load();

</script>

</body>
</html>
