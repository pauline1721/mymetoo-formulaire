<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Témoignages - MyMeToo</title>

<style>
:root{
  --violet:#24106b;
  --violet2:#6f42bd;
  --fond:#e8d7f3;
  --soft:#f7effb;
  --border:#d8c2eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--fond);
  font-family:Arial, sans-serif;
  color:var(--violet);
}

.page{
  width:100%;
  max-width:1030px;
  min-height:100vh;
  margin:0 auto;
  background:white;
  border:7px solid var(--border);
  border-radius:0 0 18px 18px;
  padding:18px 40px 30px;
  position:relative;
  overflow:hidden;
}

.leaf{
  position:absolute;
  width:480px;
  top:30px;
  opacity:.6;
  z-index:1;
}

.leaf.left{left:0}
.leaf.right{right:0}

.header{
  text-align:center;
  position:relative;
  z-index:2;
}

.logo{
  width:170px;
  display:block;
  margin:0 auto;
}

.unis{
  font-family:Georgia, serif;
  font-weight:bold;
  font-size:24px;
}

h1{
  font-family:Georgia, serif;
  font-size:60px;
  line-height:.9;
  margin:5px 0 8px;
}

.subtitle{
  font-family:Georgia, serif;
  font-size:30px;
  font-weight:bold;
  margin-bottom:18px;
}

.intro{
  position:relative;
  z-index:2;
  max-width:850px;
  margin:0 auto 25px;
  background:var(--soft);
  border:2px solid #ded2ec;
  border-radius:12px;
  text-align:center;
  padding:16px;
  font-size:20px;
  line-height:1.5;
}

.container{
  max-width:850px;
  margin:0 auto;
  position:relative;
  z-index:2;
}

.card{
  background:white;
  border:2px solid #eeeaf3;
  border-radius:14px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.04);
  overflow:hidden;
}

.meta{
  color:#6f42bd;
  font-weight:bold;
  font-size:14px;
  margin-bottom:10px;
}

.message{
  background:#f7effb;
  border-radius:12px;
  padding:18px;
  font-family:Georgia, serif;
  font-size:22px;
  line-height:1.45;

  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.message::before{
  content:"“";
  font-size:34px;
  color:#6f42bd;
}

.message::after{
  content:" ”";
  font-size:34px;
  color:#6f42bd;
}

.date{
  margin-top:10px;
  color:#8b78a8;
  font-size:13px;
  text-align:right;
}

.empty{
  text-align:center;
  background:var(--soft);
  border-radius:12px;
  padding:25px;
  font-weight:bold;
  color:#6f42bd;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#6e4cb0;
  font-weight:bold;
}

@media(max-width:800px){
  .page{padding:12px}
  .logo{width:130px}
  h1{font-size:46px}
  .subtitle{font-size:24px}
  .message{font-size:19px}
  .leaf{width:180px; opacity:.3}
}
</style>
</head>

<body>

<main class="page">

<img src="feuille-gauche.png" class="leaf left" alt="">
<img src="feuille-droite.png" class="leaf right" alt="">

<div class="header">
  <img src="logoUNIS.png" class="logo" alt="UNIS">
  <div class="unis">UNIS</div>
  <h1>MyMeToo*</h1>
  <div class="subtitle">Les voix silencieuses</div>
</div>

<div class="intro">
  Ici, seules les paroles partagées volontairement apparaissent.<br>
  Chaque témoignage reste anonyme. Chaque voix compte.
</div>

<div class="container" id="list"></div>

<div id="empty" class="empty" style="display:none;">
  Aucun témoignage pour le moment 💜
</div>

<div class="footer">
  ♡ Merci d’être là. Tu n’es pas seul(e). ♡
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load(){
  const container = document.getElementById("list");
  const empty = document.getElementById("empty");

  const q = query(collection(db,"reponses"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);

  let count = 0;

  snap.forEach(doc => {
    const d = doc.data();

    if(!d.partageAutorise || !d.message) return;

    count++;

    const date = d.createdAt?.toDate().toLocaleDateString("fr-FR") || "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="meta">${d.age || ""} • ${d.genre || ""}</div>
      <div class="message">${d.message}</div>
      <div class="date">${date}</div>
    `;

    container.appendChild(div);
  });

  if(count === 0){
    empty.style.display = "block";
  }
}

load();

</script>

</body>
</html>
