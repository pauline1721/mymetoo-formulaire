<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Témoignages - MyMeToo</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4effa;
  margin:0;
  padding:20px;
  color:#24106b;
}

.header{
  text-align:center;
  margin-bottom:30px;
}

.logo{
  width:90px;
  margin-bottom:10px;
}

h1{
  color:#5b23ad;
  margin-bottom:5px;
}

.subtitle{
  color:#666;
  font-size:15px;
}

.container{
  max-width:800px;
  margin:auto;
}

.card{
  background:white;
  border-radius:12px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.meta{
  font-size:13px;
  color:#5b23ad;
  margin-bottom:8px;
}

.message{
  font-size:16px;
  line-height:1.4;
  background:#f7effb;
  padding:12px;
  border-radius:8px;
}

.empty{
  text-align:center;
  margin-top:50px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">
  <img src="logoUNIS.png" class="logo">
  <h1>💬 Témoignages anonymes</h1>
  <div class="subtitle">Ta voix compte. Tu n’es pas seul(e).</div>
</div>

<div class="container" id="list"></div>

<div id="empty" class="empty" style="display:none;">
  Aucun témoignage pour le moment 💜
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function load(){

  const container = document.getElementById("list");
  const empty = document.getElementById("empty");

  const q = query(collection(db,"reponses"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);

  let count = 0;

  snap.forEach(doc => {
    const d = doc.data();

    // 🔒 ON FILTRE ICI
    if(!d.partageAutorise || !d.message) return;

    count++;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="meta">
        ${d.age || ""} • ${d.genre || ""}
      </div>

      <div class="message">
        ${d.message}
      </div>
    `;

    container.appendChild(div);
  });

  if(count === 0){
    empty.style.display = "block";
  }
}

load();

</script>

</body>
</html>
