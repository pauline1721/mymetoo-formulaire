<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sécurisé - MyMeToo</title>

<link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div id="login">
  <h1>🔐 Admin MyMeToo</h1>
  <p>Connexion sécurisée</p>

  <input id="email" type="email" placeholder="Email admin">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>
  <p id="error"></p>
</div>

<div id="adminContent">
  <div class="admin-layout">

    <aside class="admin-sidebar">
      <h1>📊 Admin</h1>

      <button id="nav-dashboard" class="active" onclick="showAdminSection('dashboard')">🏠 Tableau de bord</button>
      <button id="nav-reports" onclick="showAdminSection('reports')">🚨 Signalements</button>
      <button id="nav-users" onclick="showAdminSection('users')">👤 Utilisateurs</button>
      <button id="nav-chat" onclick="showAdminSection('chat')">💬 Chat public</button>
      <button id="nav-testimonials" onclick="showAdminSection('testimonials')">📝 Témoignages</button>
      <button class="logout" onclick="openBlogAsAdmin()">🌐 Ouvrir le blog</button>

      <button class="logout" onclick="logout()">Se déconnecter</button>
    </aside>

    <main class="admin-main">

      <div class="admin-top">
        <h2 id="adminTitle">Tableau de bord</h2>
      </div>

      <section id="section-dashboard" class="admin-section active">
        <div class="dashboard-grid">

          <div class="stats">
            <div class="stat">
              <strong id="total">0</strong>
              Réponses
            </div>

            <div class="stat">
              <strong id="usersCount">0</strong>
              Utilisateurs
            </div>

            <div class="stat">
              <strong id="reportsCount">0</strong>
              Signalements à traiter
            </div>

            <div class="stat">
              <strong id="disabledCount">0</strong>
              Comptes bloqués
            </div>
          </div>

          <div class="chartBox">
            <h2>Formulaires envoyés par jour</h2>
            <canvas id="dailyChart"></canvas>
          </div>

        </div>
      </section>

      <section id="section-reports" class="admin-section">
        <h2>🚨 Signalements à traiter</h2>
        <div id="reportsData"></div>
      </section>

      <section id="section-users" class="admin-section">
        <h2>👤 Utilisateurs du blog</h2>
        <div class="admin-toolbar">
          <button onclick="showAllUsers()">Tous les utilisateurs</button>
          <button onclick="showOnlineUsers()">Utilisateurs connectés</button>
        </div>
        <div id="usersData"></div>
      </section>

      <section id="section-chat" class="admin-section">
        <h2>💬 Messages publics</h2>
        <div id="messagesData"></div>
      </section>

      <section id="section-testimonials" class="admin-section">
        <h2>📝 Témoignages</h2>
        <div id="data"></div>
      </section>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/admin.js"></script>

</body>
</html>
