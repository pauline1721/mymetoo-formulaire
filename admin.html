<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sécurisé - MyMeToo</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4effa;
  margin:0;
  padding:20px;
  color:#24106b;
}

h1,h2{
  text-align:center;
  color:#5b23ad;
}

#login{
  max-width:380px;
  margin:70px auto;
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
}

button{
  background:#5b23ad;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

button:hover{
  background:#47208d;
}

#error{
  color:red;
  font-weight:bold;
}

#adminContent{
  display:none;
  max-width:1100px;
  margin:0 auto;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin:20px 0;
}

.stat{
  background:white;
  padding:18px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.stat strong{
  display:block;
  font-size:30px;
  color:#5b23ad;
}

#data{
  max-width:900px;
  margin:0 auto;
}

.card{
  background:white;
  border-radius:12px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  font-size:16px;
  line-height:1.5;
  color:#24106b;
}

.field{
  margin:8px 0;
}

.label{
  font-weight:bold;
  color:#5b23ad;
}

.message{
  background:#f7effb;
  padding:12px;
  border-radius:8px;
  margin-top:12px;
  font-size:17px;
}

.logout{
  display:block;
  margin:0 auto 20px;
}

.empty{
  text-align:center;
  background:white;
  padding:25px;
  border-radius:12px;
  color:#5b23ad;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="login">
  <h1>🔐 Admin MyMeToo</h1>
  <p>Connexion sécurisée</p>

  <input id="email" type="email" placeholder="Email admin">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>
  <p id="error"></p>
</div>

<div id="adminContent">
  <h1>📊 Réponses MyMeToo</h1>

  <button class="logout" onclick="logout()">Se déconnecter</button>

  <div class="stats">
    <div class="stat">
      <strong id="total">0</strong>
      Réponses totales
    </div>
    <div class="stat">
      <strong id="partages">0</strong>
      Messages partageables
    </div>
    <div class="stat">
      <strong id="femmes">0</strong>
      Femmes
    </div>
    <div class="stat">
      <strong id="hommes">0</strong>
      Hommes
    </div>
  </div>

  <h2>Liste des réponses</h2>
  <div id="data"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch(e){
    error.innerText = "Email ou mot de passe incorrect";
  }
};

window.logout = async function(){
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  if(user){
    document.getElementById("login").style.display = "none";
    document.getElementById("adminContent").style.display = "block";
    loadData();
  }else{
    document.getElementById("login").style.display = "block";
    document.getElementById("adminContent").style.display = "none";
  }
});

async function loadData(){
  const container = document.getElementById("data");
  container.innerHTML = "";

  let total = 0;
  let partages = 0;
  let femmes = 0;
  let hommes = 0;

  const q = query(collection(db, "reponses"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    container.innerHTML = `<div class="empty">Aucune réponse pour le moment.</div>`;
  }

  snapshot.forEach(doc => {
    const d = doc.data();

    total++;

    if(d.partageAutorise && d.message){
      partages++;
    }

    if(d.genre === "Une femme"){
      femmes++;
    }

    if(d.genre === "Un homme"){
      hommes++;
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="field"><span class="label">Âge :</span> ${d.age || ""}</div>
      <div class="field"><span class="label">Genre :</span> ${d.genre || ""}</div>
      <div class="field"><span class="label">Justice :</span> ${d.justice || ""}</div>
      <div class="field"><span class="label">Parlé :</span> ${d.parle || ""}</div>
      <div class="field"><span class="label">Écoute :</span> ${d.ecoute || ""}</div>
      <div class="field"><span class="label">Expression :</span> ${(d.expression || []).join(", ")}</div>
      <div class="field"><span class="label">Partage autorisé :</span> ${d.partageAutorise ? "Oui" : "Non"}</div>
      <div class="field"><span class="label">Date :</span> ${d.createdAt?.toDate().toLocaleString() || ""}</div>
      <div class="message"><span class="label">Message :</span><br>${d.message || "Aucun message"}</div>
    `;

    container.appendChild(div);
  });

  document.getElementById("total").innerText = total;
  document.getElementById("partages").innerText = partages;
  document.getElementById("femmes").innerText = femmes;
  document.getElementById("hommes").innerText = hommes;
}

</script>

</body>
</html>
