<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin sécurisé</title>

<style>
body{font-family:Arial;background:#f4effa;padding:20px}
input{padding:10px;margin:5px;width:250px}
button{padding:10px;background:#5b23ad;color:white;border:none}
.card{background:white;padding:10px;margin:10px;border-radius:8px}
</style>
</head>

<body>

<h2>Connexion Admin</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Mot de passe"><br>
<button onclick="login()">Se connecter</button>

<hr>

<div id="data"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, password);
    loadData();
  }catch(e){
    alert("Erreur connexion");
  }
}

async function loadData(){
  const container = document.getElementById("data");
  container.innerHTML = "";

  const q = query(collection(db, "reponses"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach(doc => {
    const d = doc.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>Âge :</b> ${d.age}<br>
      <b>Genre :</b> ${d.genre}<br>
      <b>Écoute :</b> ${d.ecoute}<br>
      <b>Message :</b> ${d.message}<br>
    `;

    container.appendChild(div);
  });
}

</script>
</body>
</html>
