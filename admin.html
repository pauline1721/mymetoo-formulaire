<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin sécurisé - MyMeToo</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f4effa;
  margin:0;
  padding:20px;
  color:#24106b;
}

h1,h2{
  text-align:center;
  color:#5b23ad;
}

#login{
  max-width:380px;
  margin:70px auto;
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
}

button{
  background:#5b23ad;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

#adminContent{
  display:none;
  max-width:1100px;
  margin:0 auto;
}

.card{
  background:white;
  border-radius:12px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.label{
  font-weight:bold;
  color:#5b23ad;
}

.message{
  background:#f7effb;
  padding:12px;
  border-radius:8px;
  margin-top:12px;
}

.reply-admin{
  background:#fbf8ff;
  border-left:4px solid #6f42bd;
  padding:10px;
  margin-top:10px;
}

.reply-hide-btn{
  margin-top:8px;
  background:#d94b6a;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.hide-btn{
  margin-top:12px;
  background:#6f42bd;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="login">
  <h1>🔐 Admin MyMeToo</h1>
  <input id="email" type="email" placeholder="Email admin">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
  <p id="error"></p>
</div>

<div id="adminContent">
  <h1>📊 Réponses MyMeToo</h1>
  <button onclick="logout()">Se déconnecter</button>
  <div id="data"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );
  }catch{
    document.getElementById("error").innerText = "Erreur connexion";
  }
};

window.logout = () => signOut(auth);

window.toggleVisibility = async (id, visible)=>{
  await updateDoc(doc(db,"reponses",id),{
    visible: !visible
  });
  load();
};

window.toggleReply = async (parent, id, visible)=>{
  await updateDoc(doc(db,"reponses",parent,"commentaires",id),{
    visible: !visible
  });
  load();
};

onAuthStateChanged(auth,user=>{
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("adminContent").style.display="block";
    load();
  }
});

async function load(){

  const container = document.getElementById("data");
  container.innerHTML = "";

  const snap = await getDocs(query(collection(db,"reponses"),orderBy("createdAt","desc")));

  for(const item of snap.docs){

    const d = item.data();
    const id = item.id;
    const visible = d.visible !== false;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div><span class="label">Âge :</span> ${d.age}</div>
      <div><span class="label">Genre :</span> ${d.genre}</div>

      <div><span class="label">Inscrit blog :</span> ${d.blogAccessRequested ? "Oui":"Non"}</div>
      <div><span class="label">Pseudo :</span> ${d.blogPseudo || ""}</div>
      <div><span class="label">UID :</span> ${d.blogUid || ""}</div>

      <div class="message">${d.message || ""}</div>

      <button onclick="toggleVisibility('${id}',${visible})" class="hide-btn">
        ${visible ? "Masquer":"Afficher"}
      </button>

      <div id="rep-${id}"></div>
    `;

    container.appendChild(div);

    // 🔥 CHARGER LES RÉPONSES
    const repliesSnap = await getDocs(collection(db,"reponses",id,"commentaires"));

    repliesSnap.forEach(r=>{
      const rd = r.data();
      const rId = r.id;
      const rVisible = rd.visible !== false;

      const rep = document.createElement("div");
      rep.className = "reply-admin";

      rep.innerHTML = `
        ${rd.message}
        <br>
        <button onclick="toggleReply('${id}','${rId}',${rVisible})" class="reply-hide-btn">
          ${rVisible ? "Masquer":"Afficher"}
        </button>
      `;

      div.querySelector("#rep-"+id).appendChild(rep);
    });

  }
}

</script>

</body>
</html>
