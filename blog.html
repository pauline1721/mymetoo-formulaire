<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog sécurisé - MyMeToo</title>

<style>
:root{
  --violet:#24106b;
  --violet2:#6f42bd;
  --fond:#e8d7f3;
  --soft:#f7effb;
  --border:#d8c2eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--fond);
  font-family:Arial, sans-serif;
  color:var(--violet);
}

.page{
  width:100%;
  max-width:1200px;
  min-height:100vh;
  margin:0 auto;
  background:white;
  border:7px solid var(--border);
  border-radius:0 0 18px 18px;
  padding:18px 30px 30px;
  position:relative;
  overflow:hidden;
}

.leaf{
  position:absolute;
  width:480px;
  top:30px;
  opacity:.45;
  z-index:1;
}

.leaf.left{left:0}
.leaf.right{right:0}

.header{
  text-align:center;
  position:relative;
  z-index:2;
}

.logo{
  width:160px;
  display:block;
  margin:0 auto;
}

.unis{
  font-family:Georgia, serif;
  font-weight:bold;
  font-size:23px;
}

h1{
  font-family:Georgia, serif;
  font-size:56px;
  line-height:.9;
  margin:5px 0 8px;
}

.subtitle{
  font-family:Georgia, serif;
  font-size:28px;
  font-weight:bold;
  margin-bottom:18px;
}

.box{
  max-width:430px;
  margin:0 auto 20px;
  background:var(--soft);
  border:2px solid #ded2ec;
  border-radius:12px;
  padding:18px;
  position:relative;
  z-index:2;
}

input, textarea{
  width:100%;
  border:2px solid #d8c2eb;
  border-radius:10px;
  padding:12px;
  font-size:16px;
  margin-top:10px;
}

button{
  margin-top:12px;
  background:linear-gradient(90deg,#5b23ad,#7e45d1);
  color:white;
  border:none;
  padding:11px 18px;
  border-radius:9px;
  font-weight:bold;
  cursor:pointer;
}

button.secondary{
  background:#6f42bd;
}

.status{
  margin-top:10px;
  font-weight:bold;
  color:#5b23ad;
}

#blogContent{
  display:none;
  position:relative;
  z-index:2;
}

.chat-layout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:18px;
  max-width:1050px;
  margin:0 auto;
}

.members-panel{
  background:#f7effb;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  height:600px;
  overflow-y:auto;
}

.members-panel h2{
  margin-top:0;
  color:#5b23ad;
  font-size:22px;
}

.member{
  background:white;
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  font-weight:bold;
  color:#5b23ad;
}

.chat-panel{
  background:#f7effb;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  height:600px;
  display:flex;
  flex-direction:column;
}

.chat-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.chat-top strong{
  color:#5b23ad;
}

.messages{
  flex:1;
  overflow-y:auto;
  background:white;
  border-radius:12px;
  padding:15px;
  border:2px solid #eeeaf3;
}

.msg{
  background:#f7effb;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.msg-meta{
  font-weight:bold;
  color:#6f42bd;
  margin-bottom:6px;
}

.msg-date{
  color:#8b78a8;
  font-size:12px;
  margin-top:6px;
  text-align:right;
}

.write-box{
  margin-top:12px;
}

.write-box textarea{
  min-height:75px;
  resize:vertical;
  background:white;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#6e4cb0;
  font-weight:bold;
}

@media(max-width:800px){
  .page{padding:12px}
  .logo{width:130px}
  h1{font-size:46px}
  .subtitle{font-size:24px}
  .leaf{width:180px; opacity:.25}

  .chat-layout{
    grid-template-columns:1fr;
  }

  .members-panel{
    height:auto;
    max-height:180px;
  }

  .chat-panel{
    height:620px;
  }
}
</style>
</head>

<body>

<main class="page">

<img src="feuille-gauche.png" class="leaf left" alt="">
<img src="feuille-droite.png" class="leaf right" alt="">

<div class="header">
  <img src="logoUNIS.png" class="logo" alt="UNIS">
  <div class="unis">UNIS</div>
  <h1>MyMeToo*</h1>
  <div class="subtitle">Blog sécurisé</div>
</div>

<div id="loginBox" class="box">
  <h2>Connexion au blog</h2>
  <p>Connecte-toi avec le compte créé depuis le formulaire.</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>

  <p>
    Pas encore de compte ?<br>
    <a href="index.html">Remplir le formulaire MyMeToo</a>
  </p>

  <div id="loginStatus" class="status"></div>
</div>

<div id="blogContent">

  <div class="chat-layout">

    <aside class="members-panel">
      <h2>Membres du blog</h2>
      <div id="membersList"></div>
    </aside>

    <section class="chat-panel">

      <div class="chat-top">
        <strong id="welcomePseudo">Connecté(e)</strong>
        <button class="secondary" onclick="logout()">Se déconnecter</button>
      </div>

      <div id="messages" class="messages"></div>

      <div class="write-box">
        <textarea id="chatMessage" placeholder="Écris ton message ici..."></textarea>
        <button onclick="sendMessage()">Envoyer</button>
        <div id="messageStatus" class="status"></div>
      </div>

    </section>

  </div>

</div>

<div class="footer">
  ♡ Un espace privé pour échanger avec respect. ♡
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  serverTimestamp,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentPseudo = "Anonyme";
let currentUserActive = true;

window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const status = document.getElementById("loginStatus");

  status.textContent = "";

  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch(e){
    status.textContent = "Email ou mot de passe incorrect.";
  }
};

window.logout = async function(){
  await signOut(auth);
};

onAuthStateChanged(auth, async user => {
  if(user){
    const profileRef = doc(db, "blogUsers", user.uid);
    const profileSnap = await getDoc(profileRef);

    if(!profileSnap.exists()){
      await signOut(auth);
      document.getElementById("loginStatus").textContent = "Compte blog introuvable.";
      return;
    }

    const profile = profileSnap.data();

    if(profile.active === false){
      await signOut(auth);
      document.getElementById("loginStatus").textContent = "Ce compte a été désactivé.";
      return;
    }

    currentPseudo = profile.pseudo || "Anonyme";
    currentUserActive = true;

    document.getElementById("welcomePseudo").textContent = "Connecté(e) : " + currentPseudo;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("blogContent").style.display = "block";

    await loadMembers();
    await loadMessages();

  }else{
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("blogContent").style.display = "none";
  }
});

async function loadMembers(){
  const container = document.getElementById("membersList");
  container.innerHTML = "";

  const snap = await getDocs(collection(db, "blogUsers"));

  snap.forEach(userDoc => {
    const u = userDoc.data();

    if(u.active === false) return;

    const div = document.createElement("div");
    div.className = "member";
    div.textContent = u.pseudo || "Anonyme";

    container.appendChild(div);
  });
}

window.sendMessage = async function(){
  const textarea = document.getElementById("chatMessage");
  const status = document.getElementById("messageStatus");
  const user = auth.currentUser;
  const text = textarea.value.trim();

  if(!user || !currentUserActive){
    status.textContent = "Tu dois être connecté(e).";
    return;
  }

  if(!text){
    status.textContent = "Merci d’écrire un message.";
    return;
  }

  status.textContent = "Envoi en cours...";

  try{
    await addDoc(collection(db, "blogMessages"), {
      uid: user.uid,
      pseudo: currentPseudo,
      message: text,
      visible: true,
      createdAt: serverTimestamp()
    });

    textarea.value = "";
    status.textContent = "";
    await loadMessages();

  }catch(e){
    console.error(e);
    status.textContent = "Erreur lors de l’envoi.";
  }
};

async function loadMessages(){
  const container = document.getElementById("messages");
  container.innerHTML = "";

  const q = query(collection(db, "blogMessages"), orderBy("createdAt", "asc"));
  const snap = await getDocs(q);

  snap.forEach(msgDoc => {
    const m = msgDoc.data();

    if(m.visible === false) return;

    const date = m.createdAt?.toDate().toLocaleString("fr-FR") || "";

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div class="msg-meta">${m.pseudo || "Anonyme"}</div>
      <div>${m.message || ""}</div>
      <div class="msg-date">${date}</div>
    `;

    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

setInterval(() => {
  if(auth.currentUser){
    loadMessages();
  }
}, 10000);

</script>

</body>
</html>
