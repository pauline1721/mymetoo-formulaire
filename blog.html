<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog sécurisé - MyMeToo</title>

<style>
:root{
  --violet:#24106b;
  --violet2:#6f42bd;
  --fond:#e8d7f3;
  --soft:#f7effb;
  --border:#d8c2eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--fond);
  font-family:Arial, sans-serif;
  color:var(--violet);
}

.page{
  width:100%;
  max-width:1200px;
  min-height:100vh;
  margin:0 auto;
  background:white;
  border:7px solid var(--border);
  border-radius:0 0 18px 18px;
  padding:18px 30px 30px;
  position:relative;
  overflow:hidden;
}

.leaf{
  position:absolute;
  width:480px;
  top:30px;
  opacity:.45;
  z-index:1;
}

.leaf.left{left:0}
.leaf.right{right:0}

.header{
  text-align:center;
  position:relative;
  z-index:2;
}

.logo{
  width:160px;
  display:block;
  margin:0 auto;
}

.unis{
  font-family:Georgia, serif;
  font-weight:bold;
  font-size:23px;
}

h1{
  font-family:Georgia, serif;
  font-size:56px;
  line-height:.9;
  margin:5px 0 8px;
}

.subtitle{
  font-family:Georgia, serif;
  font-size:28px;
  font-weight:bold;
  margin-bottom:18px;
}

.box{
  max-width:430px;
  margin:0 auto 20px;
  background:var(--soft);
  border:2px solid #ded2ec;
  border-radius:12px;
  padding:18px;
  position:relative;
  z-index:2;
}

input, textarea{
  width:100%;
  border:2px solid #d8c2eb;
  border-radius:10px;
  padding:12px;
  font-size:16px;
  margin-top:10px;
}

button{
  margin-top:12px;
  background:linear-gradient(90deg,#5b23ad,#7e45d1);
  color:white;
  border:none;
  padding:11px 18px;
  border-radius:9px;
  font-weight:bold;
  cursor:pointer;
}

button.secondary{
  background:#6f42bd;
}

.status{
  margin-top:10px;
  font-weight:bold;
  color:#5b23ad;
}

#blogContent{
  display:none;
  position:relative;
  z-index:2;
}

.chat-layout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:18px;
  max-width:1050px;
  margin:0 auto;
}

.members-panel{
  background:#f7effb;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  height:600px;
  overflow-y:auto;
}

.members-panel h2{
  margin-top:0;
  color:#5b23ad;
  font-size:22px;
}

.member{
  background:white;
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  font-weight:bold;
  color:#5b23ad;
  cursor:pointer;
  transition:.2s;
}

.member:hover{
  background:#efe4f8;
}

.member::before{
  content:"● ";
  color:#2fbb62;
}

.private-badge{
  display:inline-block;
  background:#d94b6a;
  color:white;
  border-radius:999px;
  padding:2px 7px;
  font-size:12px;
  margin-left:6px;
}

.chat-panel{
  background:#f7effb;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  height:600px;
  display:flex;
  flex-direction:column;
}

.chat-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.chat-top strong{
  color:#5b23ad;
}

.messages{
  flex:1;
  overflow-y:auto;
  background:white;
  border-radius:12px;
  padding:15px;
  border:2px solid #eeeaf3;
}

.msg{
  background:#f7effb;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.msg-meta{
  font-weight:bold;
  color:#6f42bd;
  margin-bottom:6px;
}

.msg-date{
  color:#8b78a8;
  font-size:12px;
  margin-top:6px;
  text-align:right;
}

.write-box{
  margin-top:12px;
}

.write-box textarea{
  min-height:75px;
  resize:vertical;
  background:white;
}

/* MESSAGE PRIVÉ */
.private-panel{
  max-width:1050px;
  margin:18px auto 0;
  background:#fbf8ff;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  display:none;
  position:relative;
  z-index:2;
}

.private-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  color:#5b23ad;
  font-weight:bold;
}

.private-messages{
  background:white;
  border:2px solid #eeeaf3;
  border-radius:12px;
  padding:12px;
  height:220px;
  overflow-y:auto;
}

.private-msg{
  background:#f7effb;
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.private-msg.mine{
  background:#eadcf8;
}

.private-msg small{
  display:block;
  color:#8b78a8;
  font-size:12px;
  margin-top:5px;
}

.private-write textarea{
  min-height:60px;
  background:white;
}

.close-private{
  background:#d94b6a;
  padding:8px 12px;
  margin-top:0;
}

.visual-notification{
  display:none;
  max-width:1050px;
  margin:0 auto 15px;
  background:#fff5f7;
  color:#d94b6a;
  border:2px solid #d94b6a;
  border-radius:12px;
  padding:12px;
  font-weight:bold;
  text-align:center;
  position:relative;
  z-index:3;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#6e4cb0;
  font-weight:bold;
}

@media(max-width:800px){
  .page{padding:12px}
  .logo{width:130px}
  h1{font-size:46px}
  .subtitle{font-size:24px}
  .leaf{width:180px; opacity:.25}

  .chat-layout{
    grid-template-columns:1fr;
  }

  .members-panel{
    height:auto;
    max-height:180px;
  }

  .chat-panel{
    height:620px;
  }

  .private-messages{
    height:260px;
  }
}
</style>
</head>

<body>

<main class="page">

<img src="feuille-gauche.png" class="leaf left" alt="">
<img src="feuille-droite.png" class="leaf right" alt="">

<div class="header">
  <img src="logoUNIS.png" class="logo" alt="UNIS">
  <div class="unis">UNIS</div>
  <h1>MyMeToo*</h1>
  <div class="subtitle">Blog sécurisé</div>
</div>

<div id="loginBox" class="box">
  <h2>Connexion au blog</h2>
  <p>Connecte-toi avec le compte créé depuis le formulaire.</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>

  <p>
    Pas encore de compte ?<br>
    <a href="index.html">Remplir le formulaire MyMeToo</a>
  </p>

  <div id="loginStatus" class="status"></div>
</div>

<div id="blogContent">

  <div id="visualNotification" class="visual-notification"></div>

  <div class="chat-layout">

    <aside class="members-panel">
      <h2>En ligne</h2>
      <div id="membersList"></div>
    </aside>

    <section class="chat-panel">

      <div class="chat-top">
        <strong id="welcomePseudo">Connecté(e)</strong>
        <button class="secondary" onclick="logout()">Se déconnecter</button>
      </div>

      <div id="messages" class="messages"></div>

      <div class="write-box">
        <textarea id="chatMessage" placeholder="Écris ton message ici..."></textarea>
        <button onclick="sendMessage()">Envoyer</button>
        <div id="messageStatus" class="status"></div>
      </div>

    </section>

  </div>

  <div id="privatePanel" class="private-panel">
    <div class="private-header">
      <span id="privateTitle">Message privé</span>
      <button class="close-private" onclick="closePrivateChat()">Fermer</button>
    </div>

    <div id="privateMessages" class="private-messages"></div>

    <div class="private-write">
      <textarea id="privateText" placeholder="Écris ton message privé ici..."></textarea>
      <button onclick="sendPrivateMessage()">Envoyer en privé</button>
      <div id="privateStatus" class="status"></div>
    </div>
  </div>

</div>

<div class="footer">
  ♡ Un espace privé pour échanger avec respect. ♡
</div>

</main>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  serverTimestamp,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentPseudo = "Anonyme";
let currentUserActive = true;
let currentPrivateUser = null;

// LOGIN
window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch{
    document.getElementById("loginStatus").textContent = "Erreur connexion";
  }
};

// LOGOUT
window.logout = async function(){
  const user = auth.currentUser;
  if(user){
    await updateDoc(doc(db,"blogUsers",user.uid),{online:false});
  }
  await signOut(auth);
};

// AUTH STATE
onAuthStateChanged(auth, async user => {
  if(user){

    const snap = await getDoc(doc(db,"blogUsers",user.uid));
    const data = snap.data();

    if(data.active === false){
      await signOut(auth);
      return;
    }

    currentPseudo = data.pseudo;

    await updateDoc(doc(db,"blogUsers",user.uid),{
      online:true,
      lastSeen:serverTimestamp()
    });

    document.getElementById("welcomePseudo").innerText = currentPseudo;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("blogContent").style.display="block";

    loadMembers();
    loadMessages();

  }else{
    document.getElementById("loginBox").style.display="block";
    document.getElementById("blogContent").style.display="none";
  }
});

// MEMBRES EN LIGNE + CLICK POUR MP
async function loadMembers(){
  const container = document.getElementById("membersList");
  container.innerHTML="";

  const snap = await getDocs(collection(db,"blogUsers"));
  const now = Date.now();

  snap.forEach(d=>{
    const u = d.data();
    if(!u.online) return;

    const div = document.createElement("div");
    div.className="member";
    div.innerText = u.pseudo;

    div.onclick = ()=> openPrivateChat(d.id,u.pseudo);

    container.appendChild(div);
  });
}

// CHAT GLOBAL
window.sendMessage = async function(){
  const text = document.getElementById("chatMessage").value.trim();
  if(!text) return;

  await addDoc(collection(db,"blogMessages"),{
    pseudo:currentPseudo,
    message:text,
    createdAt:serverTimestamp(),
    visible:true
  });

  document.getElementById("chatMessage").value="";
  loadMessages();
};

async function loadMessages(){
  const container = document.getElementById("messages");
  container.innerHTML="";

  const snap = await getDocs(query(collection(db,"blogMessages"),orderBy("createdAt","asc")));

  snap.forEach(d=>{
    const m=d.data();
    if(m.visible===false) return;

    const div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <div class="msg-meta">${m.pseudo}</div>
      <div>${m.message}</div>
    `;

    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

// ====== MESSAGE PRIVÉ ======

function getChatId(uid1,uid2){
  return uid1 < uid2 ? uid1+"_"+uid2 : uid2+"_"+uid1;
}

window.openPrivateChat = function(uid,pseudo){
  currentPrivateUser = {uid,pseudo};

  document.getElementById("privatePanel").style.display="block";
  document.getElementById("privateTitle").innerText="Discussion avec "+pseudo;

  loadPrivateMessages();
};

window.closePrivateChat = function(){
  document.getElementById("privatePanel").style.display="none";
  currentPrivateUser=null;
};

window.sendPrivateMessage = async function(){
  const text = document.getElementById("privateText").value.trim();
  if(!text) return;

  const user = auth.currentUser;
  const chatId = getChatId(user.uid,currentPrivateUser.uid);

  await addDoc(collection(db,"privateMessages",chatId,"messages"),{
    from:user.uid,
    to:currentPrivateUser.uid,
    pseudo:currentPseudo,
    message:text,
    createdAt:serverTimestamp()
  });

  document.getElementById("privateText").value="";
  loadPrivateMessages();
};

async function loadPrivateMessages(){
  if(!currentPrivateUser) return;

  const user = auth.currentUser;
  const chatId = getChatId(user.uid,currentPrivateUser.uid);

  const container = document.getElementById("privateMessages");
  container.innerHTML="";

  const snap = await getDocs(query(
    collection(db,"privateMessages",chatId,"messages"),
    orderBy("createdAt","asc")
  ));

  snap.forEach(d=>{
    const m=d.data();

    const div=document.createElement("div");
    div.className="private-msg "+(m.from===user.uid?"mine":"");

    div.innerHTML=`
      ${m.message}
    `;

    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

// ====== NOTIFICATION VISUELLE ======

let lastMessageCount = 0;

async function checkNewMessages(){
  const snap = await getDocs(collection(db,"blogMessages"));
  const count = snap.size;

  if(count > lastMessageCount && lastMessageCount !== 0){
    const notif = document.getElementById("visualNotification");
    notif.innerText = "💬 Nouveau message reçu";
    notif.style.display="block";

    setTimeout(()=> notif.style.display="none",3000);
  }

  lastMessageCount = count;
}

// REFRESH
setInterval(()=>{
  if(auth.currentUser){
    loadMessages();
    loadMembers();
    loadPrivateMessages();
    checkNewMessages();
  }
},4000);

</script>
