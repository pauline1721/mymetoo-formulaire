<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog sécurisé - MyMeToo</title>

<style>
:root{
  --violet:#24106b;
  --violet2:#6f42bd;
  --fond:#e8d7f3;
  --soft:#f7effb;
  --border:#d8c2eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--fond);
  font-family:Arial, sans-serif;
  color:var(--violet);
}

.page{
  width:100%;
  max-width:1200px;
  min-height:100vh;
  margin:0 auto;
  background:white;
  border:7px solid var(--border);
  border-radius:0 0 18px 18px;
  padding:18px 30px 30px;
  position:relative;
  overflow:hidden;
}

.leaf{
  position:absolute;
  width:480px;
  top:30px;
  opacity:.45;
  z-index:1;
}

.leaf.left{left:0}
.leaf.right{right:0}

.header{
  text-align:center;
  position:relative;
  z-index:2;
}

.logo{
  width:160px;
  display:block;
  margin:0 auto;
}

.unis{
  font-family:Georgia, serif;
  font-weight:bold;
  font-size:23px;
}

h1{
  font-family:Georgia, serif;
  font-size:56px;
  line-height:.9;
  margin:5px 0 8px;
}

.subtitle{
  font-family:Georgia, serif;
  font-size:28px;
  font-weight:bold;
  margin-bottom:18px;
}

.box{
  max-width:430px;
  margin:0 auto 20px;
  background:var(--soft);
  border:2px solid #ded2ec;
  border-radius:12px;
  padding:18px;
  position:relative;
  z-index:2;
}

input, textarea{
  width:100%;
  border:2px solid #d8c2eb;
  border-radius:10px;
  padding:12px;
  font-size:16px;
  margin-top:10px;
}

button{
  margin-top:12px;
  background:linear-gradient(90deg,#5b23ad,#7e45d1);
  color:white;
  border:none;
  padding:11px 18px;
  border-radius:9px;
  font-weight:bold;
  cursor:pointer;
}

button.secondary{
  background:#6f42bd;
}

.status{
  margin-top:10px;
  font-weight:bold;
  color:#5b23ad;
}

#blogContent{
  display:none;
  position:relative;
  z-index:2;
}

.visual-notification{
  display:none;
  max-width:1050px;
  margin:0 auto 15px;
  background:#fff5f7;
  color:#d94b6a;
  border:2px solid #d94b6a;
  border-radius:12px;
  padding:12px;
  font-weight:bold;
  text-align:center;
  position:relative;
  z-index:3;
}

.chat-layout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:18px;
  max-width:1050px;
  margin:0 auto;
}

.members-panel{
  background:#f7effb;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  height:600px;
  overflow-y:auto;
}

.members-panel h2{
  margin-top:0;
  color:#5b23ad;
  font-size:22px;
}

.member{
  background:white;
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  font-weight:bold;
  color:#5b23ad;
  cursor:pointer;
}

.member:hover{
  background:#efe4f8;
}

.member::before{
  content:"● ";
  color:#2fbb62;
}

.chat-panel{
  background:#f7effb;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  height:600px;
  display:flex;
  flex-direction:column;
}

.chat-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

.chat-top strong{
  color:#5b23ad;
}

.tabs button{
  margin-right:6px;
}

.notif-count{
  background:#d94b6a;
  color:white;
  border-radius:999px;
  padding:3px 8px;
  font-size:13px;
  margin-left:4px;
}

.messages,
.private-list{
  flex:1;
  overflow-y:auto;
  background:white;
  border-radius:12px;
  padding:15px;
  border:2px solid #eeeaf3;
}

.private-list{
  display:none;
}

.msg{
  background:#f7effb;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.msg.private-preview{
  cursor:pointer;
}

.msg.private-preview:hover{
  background:#efe4f8;
}

.msg-meta{
  font-weight:bold;
  color:#6f42bd;
  margin-bottom:6px;
}

.msg-date{
  color:#8b78a8;
  font-size:12px;
  margin-top:6px;
  text-align:right;
}

.badge-new{
  display:inline-block;
  background:#d94b6a;
  color:white;
  border-radius:999px;
  padding:3px 8px;
  font-size:12px;
  margin-left:8px;
}

.write-box{
  margin-top:12px;
}

.write-box textarea{
  min-height:75px;
  resize:vertical;
  background:white;
}

.private-panel{
  max-width:1050px;
  margin:18px auto 0;
  background:#fbf8ff;
  border:2px solid #ded2ec;
  border-radius:14px;
  padding:15px;
  display:none;
  position:relative;
  z-index:2;
}

.private-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
  color:#5b23ad;
  font-weight:bold;
}

.private-messages{
  background:white;
  border:2px solid #eeeaf3;
  border-radius:12px;
  padding:12px;
  height:220px;
  overflow-y:auto;
}

.private-msg{
  background:#f7effb;
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
  word-wrap:break-word;
  overflow-wrap:break-word;
  word-break:break-word;
}

.private-msg.mine{
  background:#eadcf8;
}

.private-msg small{
  display:block;
  color:#8b78a8;
  font-size:12px;
  margin-top:5px;
}

.private-write textarea{
  min-height:60px;
  background:white;
}

.close-private{
  background:#d94b6a;
  padding:8px 12px;
  margin-top:0;
}

.footer{
  text-align:center;
  margin-top:30px;
  color:#6e4cb0;
  font-weight:bold;
}

@media(max-width:800px){
  .page{padding:12px}
  .logo{width:130px}
  h1{font-size:46px}
  .subtitle{font-size:24px}
  .leaf{width:180px; opacity:.25}

  .chat-layout{
    grid-template-columns:1fr;
  }

  .members-panel{
    height:auto;
    max-height:180px;
  }

  .chat-panel{
    height:620px;
  }

  .private-messages{
    height:260px;
  }
}
</style>
</head>

<body>

<main class="page">

<img src="feuille-gauche.png" class="leaf left" alt="">
<img src="feuille-droite.png" class="leaf right" alt="">

<div class="header">
  <img src="logoUNIS.png" class="logo" alt="UNIS">
  <div class="unis">UNIS</div>
  <h1>MyMeToo*</h1>
  <div class="subtitle">Blog sécurisé</div>
</div>

<div id="loginBox" class="box">
  <h2>Connexion au blog</h2>
  <p>Connecte-toi avec le compte créé depuis le formulaire.</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="login()">Se connecter</button>

  <p>
    Pas encore de compte ?<br>
    <a href="index.html">Remplir le formulaire MyMeToo</a>
  </p>

  <div id="loginStatus" class="status"></div>
</div>

<div id="blogContent">

  <div id="visualNotification" class="visual-notification"></div>

  <div class="chat-layout">

    <aside class="members-panel">
      <h2>En ligne</h2>
      <div id="membersList"></div>
    </aside>

    <section class="chat-panel">

      <div class="chat-top">
        <div>
          <strong id="welcomePseudo">Connecté(e)</strong>
          <div class="tabs">
            <button onclick="showPublic()">Chat public</button>
            <button onclick="showPrivateList()">Messages privés <span id="notifCount" class="notif-count">0</span></button>
          </div>
        </div>

        <button class="secondary" onclick="logout()">Se déconnecter</button>
      </div>

      <div id="messages" class="messages"></div>
      <div id="privateList" class="private-list"></div>

      <div class="write-box" id="publicWriteBox">
        <textarea id="chatMessage" placeholder="Écris ton message ici..."></textarea>
        <button onclick="sendMessage()">Envoyer</button>
        <div id="messageStatus" class="status"></div>
      </div>

    </section>

  </div>

  <div id="privatePanel" class="private-panel">
    <div class="private-header">
      <span id="privateTitle">Message privé</span>
      <button class="close-private" onclick="closePrivateChat()">Fermer</button>
    </div>

    <div id="privateMessages" class="private-messages"></div>

    <div class="private-write">
      <textarea id="privateText" placeholder="Écris ton message privé ici..."></textarea>
      <button onclick="sendPrivateMessage()">Envoyer en privé</button>
      <div id="privateStatus" class="status"></div>
    </div>
  </div>

</div>

<div class="footer">
  ♡ Un espace privé pour échanger avec respect. ♡
</div>

</main>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  serverTimestamp,
  doc,
  getDoc,
  updateDoc,
  setDoc,
  where,
  arrayUnion,
  arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCCIJ_gwCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentPseudo = "Anonyme";
let currentUserActive = true;
let currentPrivateUser = null;
let privateConversations = [];
let lastPublicMessageCount = 0;

window.login = async function(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const status = document.getElementById("loginStatus");

  status.textContent = "";

  try{
    await signInWithEmailAndPassword(auth, email, password);
  }catch{
    status.textContent = "Email ou mot de passe incorrect.";
  }
};

async function setOnline(user){
  if(!user) return;

  await updateDoc(doc(db, "blogUsers", user.uid), {
    online: true,
    lastSeen: serverTimestamp()
  });
}

async function setOffline(user){
  if(!user) return;

  await updateDoc(doc(db, "blogUsers", user.uid), {
    online: false,
    lastSeen: serverTimestamp()
  });
}

window.logout = async function(){
  const user = auth.currentUser;

  try{
    await setOffline(user);
  }catch(e){
    console.error(e);
  }

  await signOut(auth);
};

onAuthStateChanged(auth, async user => {
  if(user){
    const snap = await getDoc(doc(db,"blogUsers",user.uid));

    if(!snap.exists()){
      await signOut(auth);
      document.getElementById("loginStatus").textContent = "Compte blog introuvable.";
      return;
    }

    const data = snap.data();

    if(data.active === false){
      await signOut(auth);
      document.getElementById("loginStatus").textContent = "Ce compte a été désactivé.";
      return;
    }

    currentPseudo = data.pseudo || "Anonyme";
    currentUserActive = true;

    await setOnline(user);

    document.getElementById("welcomePseudo").innerText = "Connecté(e) : " + currentPseudo;
    document.getElementById("loginBox").style.display="none";
    document.getElementById("blogContent").style.display="block";

    await loadMembers();
    await loadMessages();
    await loadPrivateConversations();

  }else{
    document.getElementById("loginBox").style.display="block";
    document.getElementById("blogContent").style.display="none";
  }
});

async function loadMembers(){
  const container = document.getElementById("membersList");
  container.innerHTML="";

  const snap = await getDocs(collection(db,"blogUsers"));
  const now = Date.now();
  let count = 0;

  snap.forEach(d=>{
    const u = d.data();
    const uid = d.id;

    if(u.active === false) return;
    if(u.online !== true) return;

    const lastSeenTime = u.lastSeen?.toDate ? u.lastSeen.toDate().getTime() : 0;
    if(now - lastSeenTime > 120000) return;

    count++;

    const div = document.createElement("div");
    div.className="member";
    div.innerText = u.pseudo || "Anonyme";

    div.onclick = ()=> openPrivateChat(uid, u.pseudo || "Anonyme");

    container.appendChild(div);
  });

  if(count === 0){
    container.innerHTML = `<div class="member">Aucun membre en ligne</div>`;
  }
}

window.showPublic = function(){
  document.getElementById("messages").style.display = "block";
  document.getElementById("privateList").style.display = "none";
  document.getElementById("publicWriteBox").style.display = "block";
};

window.showPrivateList = function(){
  document.getElementById("messages").style.display = "none";
  document.getElementById("privateList").style.display = "block";
  document.getElementById("publicWriteBox").style.display = "none";
  renderPrivateList();
};

window.sendMessage = async function(){
  const text = document.getElementById("chatMessage").value.trim();
  const user = auth.currentUser;

  if(!user || !currentUserActive) return;
  if(!text) return;

  await addDoc(collection(db,"blogMessages"),{
    uid: user.uid,
    pseudo: currentPseudo,
    message:text,
    createdAt:serverTimestamp(),
    visible:true
  });

  document.getElementById("chatMessage").value="";
  await setOnline(user);
  await loadMessages();
};

async function loadMessages(){
  const container = document.getElementById("messages");
  container.innerHTML="";

  const snap = await getDocs(query(collection(db,"blogMessages"),orderBy("createdAt","asc")));

  snap.forEach(d=>{
    const m=d.data();
    if(m.visible===false) return;

    const date = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleString("fr-FR") : "";

    const div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <div class="msg-meta">${m.pseudo || "Anonyme"}</div>
      <div>${m.message || ""}</div>
      <div class="msg-date">${date}</div>
    `;

    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

function getChatId(uid1,uid2){
  return uid1 < uid2 ? uid1+"_"+uid2 : uid2+"_"+uid1;
}

window.openPrivateChat = async function(uid,pseudo){
  const user = auth.currentUser;
  if(!user) return;

  currentPrivateUser = {uid,pseudo};

  document.getElementById("privatePanel").style.display="block";
  document.getElementById("privateTitle").innerText="Discussion avec "+pseudo;

  const chatId = getChatId(user.uid, uid);

  try{
    await updateDoc(doc(db,"privateMessages",chatId), {
      unreadFor: arrayRemove(user.uid)
    });
  }catch(e){}

  await loadPrivateMessages();
  await loadPrivateConversations();
};

window.closePrivateChat = function(){
  document.getElementById("privatePanel").style.display="none";
  currentPrivateUser=null;
};

window.sendPrivateMessage = async function(){
  const text = document.getElementById("privateText").value.trim();
  const user = auth.currentUser;

  if(!text || !user || !currentPrivateUser) return;

  const chatId = getChatId(user.uid,currentPrivateUser.uid);

  const conversationRef = doc(db,"privateMessages",chatId);

  await setDoc(conversationRef, {
    participants: [user.uid, currentPrivateUser.uid],
    participantPseudos: {
      [user.uid]: currentPseudo,
      [currentPrivateUser.uid]: currentPrivateUser.pseudo
    },
    lastMessage: text,
    lastMessageAt: serverTimestamp(),
    unreadFor: arrayUnion(currentPrivateUser.uid)
  }, { merge:true });

  await addDoc(collection(db,"privateMessages",chatId,"messages"),{
    from:user.uid,
    to:currentPrivateUser.uid,
    pseudo:currentPseudo,
    message:text,
    createdAt:serverTimestamp()
  });

  document.getElementById("privateText").value="";
  await loadPrivateMessages();
  await loadPrivateConversations();
};

async function loadPrivateMessages(){
  if(!currentPrivateUser) return;

  const user = auth.currentUser;
  const chatId = getChatId(user.uid,currentPrivateUser.uid);

  const container = document.getElementById("privateMessages");
  container.innerHTML="";

  const snap = await getDocs(query(
    collection(db,"privateMessages",chatId,"messages"),
    orderBy("createdAt","asc")
  ));

  snap.forEach(d=>{
    const m=d.data();
    const date = m.createdAt?.toDate ? m.createdAt.toDate().toLocaleString("fr-FR") : "";

    const div=document.createElement("div");
    div.className="private-msg "+(m.from===user.uid?"mine":"");

    div.innerHTML=`
      ${m.message || ""}
      <small>${m.pseudo || "Anonyme"} ${date ? "• " + date : ""}</small>
    `;

    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

async function loadPrivateConversations(){
  const user = auth.currentUser;
  if(!user) return;

  const q = query(
    collection(db,"privateMessages"),
    where("participants","array-contains",user.uid)
  );

  const snap = await getDocs(q);

  privateConversations = [];
  let unread = 0;

  snap.forEach(convDoc => {
    const c = convDoc.data();
    const chatId = convDoc.id;
    const hasUnread = Array.isArray(c.unreadFor) && c.unreadFor.includes(user.uid);

    if(hasUnread) unread++;

    privateConversations.push({
      id: chatId,
      ...c,
      hasUnread
    });
  });

  privateConversations.sort((a,b)=>{
    const da = a.lastMessageAt?.toDate ? a.lastMessageAt.toDate().getTime() : 0;
    const dbb = b.lastMessageAt?.toDate ? b.lastMessageAt.toDate().getTime() : 0;
    return dbb - da;
  });

  document.getElementById("notifCount").innerText = unread;

  if(unread > 0){
    showVisualNotification("🔔 Nouveau message privé reçu");
  }

  renderPrivateList();
}

function renderPrivateList(){
  const container = document.getElementById("privateList");
  if(container.style.display !== "block") return;

  const user = auth.currentUser;
  container.innerHTML = "";

  if(privateConversations.length === 0){
    container.innerHTML = `<div class="msg">Aucune conversation privée pour le moment.</div>`;
    return;
  }

  privateConversations.forEach(c=>{
    const otherUid = c.participants.find(uid => uid !== user.uid);
    const otherPseudo = c.participantPseudos?.[otherUid] || "Utilisateur";

    const div = document.createElement("div");
    div.className = "msg private-preview";

    div.innerHTML = `
      <div class="msg-meta">
        ${otherPseudo}
        ${c.hasUnread ? `<span class="badge-new">Nouveau</span>` : ""}
      </div>
      <div>${c.lastMessage || ""}</div>
    `;

    div.onclick = () => {
      openPrivateChat(otherUid, otherPseudo);
      showPublic();
    };

    container.appendChild(div);
  });
}

function showVisualNotification(text){
  const notif = document.getElementById("visualNotification");
  notif.innerText = text;
  notif.style.display="block";

  setTimeout(()=> {
    notif.style.display="none";
  },3000);
}

let lastPublicMessageCount = 0;

async function checkNewPublicMessages(){
  const snap = await getDocs(collection(db,"blogMessages"));
  const count = snap.size;

  if(count > lastPublicMessageCount && lastPublicMessageCount !== 0){
    showVisualNotification("💬 Nouveau message public reçu");
  }

  lastPublicMessageCount = count;
}

setInterval(async ()=>{
  if(auth.currentUser){
    await loadMessages();
    await loadMembers();
    await loadPrivateMessages();
    await loadPrivateConversations();
    await checkNewPublicMessages();
  }
},4000);

window.addEventListener("beforeunload", () => {
  const user = auth.currentUser;
  if(user){
    updateDoc(doc(db,"blogUsers",user.uid),{
      online:false,
      lastSeen:serverTimestamp()
    });
  }
});

</script>

</body>
</html>
