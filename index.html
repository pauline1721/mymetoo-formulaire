<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIS - MyMeToo</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial,sans-serif;
}

.wrap{
  position:relative;
  width:100%;
  max-width:990px;
  margin:auto;
}

.bg{
  width:100%;
  display:block;
}

.zone{
  position:absolute;
  cursor:pointer;
}

.zone input{
  opacity:0;
  position:absolute;
}

.dot{
  position:absolute;
  width:1.6%;
  height:1.05%;
  border-radius:50%;
  background:transparent;
}

input:checked + .dot{
  background:#6f50b5;
}

textarea{
  position:absolute;
  left:7.8%;
  top:83.8%;
  width:84.5%;
  height:3.4%;
  border:0;
  outline:none;
  resize:none;
  background:transparent;
  color:#2d176b;
  font-size:16px;
  padding:8px;
}

button{
  position:absolute;
  left:5.5%;
  top:97.1%;
  width:17%;
  height:2.7%;
  opacity:0;
  cursor:pointer;
}

#status{
  position:absolute;
  left:25%;
  top:95.8%;
  width:50%;
  text-align:center;
  color:#2d176b;
  font-weight:bold;
  font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">
<img src="formulaire-mymetoo.png" class="bg">

<form id="formulaire">

<!-- AGE -->
<label class="zone" style="left:7%;top:29.8%;width:36%;height:2%;">
<input type="radio" name="age" value="Moins de 18 ans"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:7%;top:32.0%;width:36%;height:2%;">
<input type="radio" name="age" value="18 / 35 ans"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:7%;top:34.2%;width:36%;height:2%;">
<input type="radio" name="age" value="Plus de 35 ans"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:7%;top:36.5%;width:36%;height:2%;">
<input type="radio" name="age" value="Je préfère ne pas répondre"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>

<!-- GENRE -->
<label class="zone" style="left:55%;top:30.5%;width:34%;height:2%;">
<input type="radio" name="genre" value="Une femme"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:55%;top:33.2%;width:34%;height:2%;">
<input type="radio" name="genre" value="Un homme"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:55%;top:36.0%;width:34%;height:2%;">
<input type="radio" name="genre" value="Je préfère ne pas répondre"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>

<!-- JUSTICE -->
<label class="zone" style="left:7%;top:45.2%;width:60%;height:2%;">
<input type="radio" name="justice" value="Non, jamais"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:7%;top:48.2%;width:60%;height:3%;">
<input type="radio" name="justice" value="Oui, j’ai porté plainte ou engagé une démarche officielle"><span class="dot" style="left:1.3%;top:14%;"></span>
</label>

<!-- PAROLE -->
<label class="zone" style="left:7%;top:56.8%;width:38%;height:2%;">
<input type="radio" name="parole" value="Non, je n’en ai jamais parlé"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:7%;top:59.5%;width:38%;height:2%;">
<input type="radio" name="parole" value="Oui, à un proche"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:7%;top:62.1%;width:38%;height:3%;">
<input type="radio" name="parole" value="Oui, à un professionnel"><span class="dot" style="left:1.3%;top:14%;"></span>
</label>

<!-- ECOUTE -->
<label class="zone" style="left:55%;top:56.0%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="Oui"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:55%;top:58.7%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="Un peu"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:55%;top:61.3%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="Non"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>
<label class="zone" style="left:55%;top:64.0%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="Je ne sais pas"><span class="dot" style="left:1.3%;top:22%;"></span>
</label>

<!-- EXPRESSION -->
<label class="zone" style="left:7%;top:71.8%;width:60%;height:2%;">
<input type="checkbox" name="expression" value="Je suis là, même sans mots"><span class="dot" style="left:1.3%;top:22%;border-radius:0;"></span>
</label>
<label class="zone" style="left:7%;top:74.0%;width:60%;height:2%;">
<input type="checkbox" name="expression" value="Je veux être reconnu(e) sans devoir tout raconter"><span class="dot" style="left:1.3%;top:22%;border-radius:0;"></span>
</label>
<label class="zone" style="left:7%;top:76.2%;width:60%;height:2%;">
<input type="checkbox" name="expression" value="Je cherche à me reconstruire intérieurement"><span class="dot" style="left:1.3%;top:22%;border-radius:0;"></span>
</label>
<label class="zone" style="left:7%;top:78.4%;width:60%;height:2%;">
<input type="checkbox" name="expression" value="Je veux aider d’autres personnes en partageant mon vécu"><span class="dot" style="left:1.3%;top:22%;border-radius:0;"></span>
</label>

<textarea id="message" placeholder="Écris ici..."></textarea>

<label class="zone" style="left:7%;top:88.5%;width:84%;height:4%;">
<input type="checkbox" name="autorisation" value="oui"><span class="dot" style="left:1.3%;top:16%;border-radius:0;"></span>
</label>

<button type="submit">Envoyer</button>
<div id="status"></div>

</form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCC1J_gWCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("formulaire");
const status = document.getElementById("status");

function radio(name){
  return form.querySelector(`input[name="${name}"]:checked`)?.value || "";
}

function checks(name){
  return Array.from(form.querySelectorAll(`input[name="${name}"]:checked`)).map(e => e.value);
}

form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  const data = {
    age: radio("age"),
    genre: radio("genre"),
    justice: radio("justice"),
    parole: radio("parole"),
    ecoute: radio("ecoute"),
    expression: checks("expression"),
    message: document.getElementById("message").value.trim(),
    autorisationPartageAnonyme: form.querySelector('input[name="autorisation"]').checked,
    date: new Date()
  };

  try{
    await addDoc(collection(db,"reponses"), data);
    status.textContent = "Réponse envoyée ❤️";
    form.reset();
  }catch(err){
    status.textContent = "Erreur d’envoi";
  }
});
</script>

</body>
</html>
