<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIS - MyMeToo</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial,sans-serif;
}

.wrap{
  position:relative;
  width:100%;
  max-width:1000px;
  margin:auto;
}

.bg{
  width:100%;
  display:block;
}

/* zones cliquables */
.zone{
  position:absolute;
  cursor:pointer;
}

.zone input{
  opacity:0;
  position:absolute;
}

/* rond radio */
.dot{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #aaa;
  background:white;
}

/* coche sélectionnée */
input:checked + .dot{
  background:#6f50b5;
  border-color:#6f50b5;
  box-shadow:0 0 0 3px white inset;
}

/* carré checkbox */
.square{
  border-radius:4px;
}

/* textarea */
textarea{
  position:absolute;
  left:7.8%;
  top:83.8%;
  width:84.5%;
  height:3.5%;
  border:1px solid transparent;
  outline:none;
  resize:none;
  background:transparent;
  color:#2d176b;
  font-size:16px;
  padding:8px;
}

/* bouton invisible */
button{
  position:absolute;
  left:5.5%;
  top:97%;
  width:17%;
  height:3%;
  opacity:0;
  cursor:pointer;
}

#status{
  position:absolute;
  left:25%;
  top:95.8%;
  width:50%;
  text-align:center;
  color:#2d176b;
  font-weight:bold;
  font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">
<img src="formulaire-mymetoo.png" class="bg">

<form id="formulaire">

<!-- AGE -->
<label class="zone" style="left:7%;top:30%;width:36%;height:2%;">
<input type="radio" name="age" value="Moins de 18 ans">
<span class="dot"></span>
</label>

<label class="zone" style="left:7%;top:32.2%;width:36%;height:2%;">
<input type="radio" name="age" value="18 / 35 ans">
<span class="dot"></span>
</label>

<label class="zone" style="left:7%;top:34.5%;width:36%;height:2%;">
<input type="radio" name="age" value="Plus de 35 ans">
<span class="dot"></span>
</label>

<label class="zone" style="left:7%;top:36.8%;width:36%;height:2%;">
<input type="radio" name="age" value="Je préfère ne pas répondre">
<span class="dot"></span>
</label>

<!-- GENRE -->
<label class="zone" style="left:55%;top:30.5%;width:34%;height:2%;">
<input type="radio" name="genre" value="Une femme">
<span class="dot"></span>
</label>

<label class="zone" style="left:55%;top:33.3%;width:34%;height:2%;">
<input type="radio" name="genre" value="Un homme">
<span class="dot"></span>
</label>

<label class="zone" style="left:55%;top:36.1%;width:34%;height:2%;">
<input type="radio" name="genre" value="Je préfère ne pas répondre">
<span class="dot"></span>
</label>

<!-- JUSTICE -->
<label class="zone" style="left:7%;top:45.5%;width:60%;height:2%;">
<input type="radio" name="justice" value="Non, jamais">
<span class="dot"></span>
</label>

<label class="zone" style="left:7%;top:48.5%;width:60%;height:3%;">
<input type="radio" name="justice" value="Oui, plainte">
<span class="dot"></span>
</label>

<!-- PAROLE -->
<label class="zone" style="left:7%;top:57%;width:38%;height:2%;">
<input type="radio" name="parole" value="Non">
<span class="dot"></span>
</label>

<label class="zone" style="left:7%;top:59.7%;width:38%;height:2%;">
<input type="radio" name="parole" value="Proche">
<span class="dot"></span>
</label>

<label class="zone" style="left:7%;top:62.3%;width:38%;height:3%;">
<input type="radio" name="parole" value="Professionnel">
<span class="dot"></span>
</label>

<!-- ECOUTE -->
<label class="zone" style="left:55%;top:56%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="Oui">
<span class="dot"></span>
</label>

<label class="zone" style="left:55%;top:58.7%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="Un peu">
<span class="dot"></span>
</label>

<label class="zone" style="left:55%;top:61.3%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="Non">
<span class="dot"></span>
</label>

<label class="zone" style="left:55%;top:64%;width:34%;height:2%;">
<input type="radio" name="ecoute" value="NSP">
<span class="dot"></span>
</label>

<!-- CHECKBOX -->
<label class="zone" style="left:7%;top:72%;width:60%;height:2%;">
<input type="checkbox" name="expression">
<span class="dot square"></span>
</label>

<label class="zone" style="left:7%;top:74.3%;width:60%;height:2%;">
<input type="checkbox" name="expression">
<span class="dot square"></span>
</label>

<label class="zone" style="left:7%;top:76.6%;width:60%;height:2%;">
<input type="checkbox" name="expression">
<span class="dot square"></span>
</label>

<label class="zone" style="left:7%;top:78.8%;width:60%;height:2%;">
<input type="checkbox" name="expression">
<span class="dot square"></span>
</label>

<!-- MESSAGE -->
<textarea id="message"></textarea>

<!-- AUTORISATION -->
<label class="zone" style="left:7%;top:88.5%;width:84%;height:4%;">
<input type="checkbox" name="autorisation">
<span class="dot square"></span>
</label>

<button type="submit"></button>
<div id="status"></div>

</form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPaxlstCCC1J_gWCSAI2cNt23yu8iLaK0",
  authDomain: "mymetoo-formulaire.firebaseapp.com",
  projectId: "mymetoo-formulaire",
  storageBucket: "mymetoo-formulaire.firebasestorage.app",
  messagingSenderId: "1084270329845",
  appId: "1:1084270329845:web:337a6172a4817f0db2eabc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("formulaire").addEventListener("submit", async (e)=>{
  e.preventDefault();

  await addDoc(collection(db,"reponses"),{
    message: document.getElementById("message").value,
    date: new Date()
  });

  document.getElementById("status").innerText = "Envoyé ❤️";
});
</script>

</body>
</html>
